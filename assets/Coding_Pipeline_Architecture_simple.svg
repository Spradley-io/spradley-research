<rect width="1640" height="612" fill="#ffffff"/>
<text x="24" y="34" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="21" fill="#16202e" font-weight="bold" text-anchor="start">Qualitative Coding Pipeline  ·  Architecture</text>
<text x="24" y="55" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12.5" fill="#5a6473" font-weight="normal" text-anchor="start">From interview transcripts to HR-ready themes, with every theme traceable back to the original employee answers.</text>
<text x="24" y="73" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12" fill="#3f6fb0" font-weight="normal" text-anchor="start">Logic:  open coding  →  consolidation  →  thematic analysis.  Detail is progressively abstracted while the underlying evidence is preserved.</text>
